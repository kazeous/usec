services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: usec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - usec_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usec"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  usec_postgres:
